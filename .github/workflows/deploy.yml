name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      # Environment variables needed for testing/building
      SCALEKIT_ENVIRONMENT_URL: ${{ secrets.SCALEKIT_ENVIRONMENT_URL }}
      SCALEKIT_CLIENT_ID: ${{ secrets.SCALEKIT_CLIENT_ID }}
      SCALEKIT_CLIENT_SECRET: ${{ secrets.SCALEKIT_CLIENT_SECRET }}
      SCALEKIT_REDIRECT_URI: ${{ vars.SCALEKIT_REDIRECT_URI }}
      SCALEKIT_LOGOUT_REDIRECT_URI: ${{ vars.SCALEKIT_LOGOUT_REDIRECT_URI }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

  deploy:
    name: Build Docker & Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    env:
      # Environment variables for Docker & Vercel deployment
      SCALEKIT_ENVIRONMENT_URL: ${{ secrets.SCALEKIT_ENVIRONMENT_URL }}
      SCALEKIT_CLIENT_ID: ${{ secrets.SCALEKIT_CLIENT_ID }}
      SCALEKIT_CLIENT_SECRET: ${{ secrets.SCALEKIT_CLIENT_SECRET }}
      SCALEKIT_REDIRECT_URI: ${{ vars.SCALEKIT_REDIRECT_URI }}
      SCALEKIT_LOGOUT_REDIRECT_URI: ${{ vars.SCALEKIT_LOGOUT_REDIRECT_URI }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg SCALEKIT_ENVIRONMENT_URL=${{ secrets.SCALEKIT_ENVIRONMENT_URL }} \
            --build-arg SCALEKIT_CLIENT_ID=${{ secrets.SCALEKIT_CLIENT_ID }} \
            --build-arg SCALEKIT_CLIENT_SECRET=${{ secrets.SCALEKIT_CLIENT_SECRET }} \
            --build-arg SCALEKIT_REDIRECT_URI=${{ vars.SCALEKIT_REDIRECT_URI }} \
            --build-arg SCALEKIT_LOGOUT_REDIRECT_URI=${{ vars.SCALEKIT_LOGOUT_REDIRECT_URI }} \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:latest .

      - name: Push Docker Image to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:latest

      - name: Deploy to Vercel (Production)
        run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes

      - name: Post Deployment Notification
        if: success()
        run: echo "✅ Deployment to Vercel was successful!"

      - name: Post Deployment Failure Notification
        if: failure()
        run: echo "❌ Deployment to Vercel failed."