name: Integration

on:
  pull_request:
    branches: ['main']

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: 'Installing Dependencies'
        run: npm i

      - name: 'Run ESLint'
        id: eslint-check
        run: npx eslint .
        continue-on-error: true

      - name: 'Run ESLint Fix'
        if: steps.eslint-check.outcome == 'failure'
        run: echo "❌ESLint issues found. Running fix..."
          npx eslint . --fix

      - name: 'Run Prettier'
        id: prettier-check
        run: npx prettier --check .
        continue-on-error: true

      - name: 'Run Prettier Fix'
        if: steps.prettier-check.outcome == 'failure'
        run: echo "❌Prettier issues found. Running fix..."
          npx prettier --write .

      - name: 'Build command'
        run: npm run build

      - name: 'Running test cases'
        run: npm run test
